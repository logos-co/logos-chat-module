odule\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":\"0df1e1667498d04007b70c11363697c1\"},\"status\":\"ok\"}\nbob convo: 0df1e1667498d04007b70c11363697c1\n", "note": ""}]}, {"md": "### 5.3 Alice joins the conversation\n\n```bash\n# poll until Alice has processed the invite and joined\nlogoscore --config-dir alice call chat_module list_conversations | jq -r '.result[0].convo_id'\n```\n\nDirectV1 is group-based, so both sides share one conversation id (the\ngroup id) \u2014 unlike PrivateV1's asymmetric ids. Once the conversation\nappears, Alice has joined and subscribed to its delivery address, so she\nis ready to receive messages on it.", "execs": [{"kind": "run", "cmd": "for i in $(seq 1 50); do\n  cid=$(./logos/bin/logoscore --config-dir alice call chat_module list_conversations 2>/dev/null | jq -r '.result[0].convo_id // empty')\n  if [ -n \"$cid\" ]; then echo \"$cid\" > alice-convo.txt; echo \"ALICE_HAS_CONVO $cid\"; break; fi\n  sleep 3\ndone\n[ -s alice-convo.txt ] || { echo \"alice never joined the conversation\" >&2; exit 1; }\n", "status": "pass", "exit_code": 0, "output": "ALICE_HAS_CONVO 0df1e1667498d04007b70c11363697c1\n", "note": ""}]}, {"md": "### 5.4 Bob sends the first message\n\n```bash\nlogoscore --config-dir bob call chat_module send_message \"$BOB_CONVO\" hello-from-bob\n```\n\nBob sends only after Alice has joined (previous step), so the message\nreaches her subscribed thread rather than racing ahead of her join.", "execs": [{"kind": "run", "cmd": "cid=$(cat bob-convo.txt)\n./logos/bin/logoscore --config-dir bob call chat_module send_message \"$cid\" hello-from-bob\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"send_message\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.5 Alice receives Bob's message\n\n```bash\nlogoscore --config-dir alice call chat_module get_messages \"$ALICE_CONVO\"\n```\n\nDirectV1 gives both sides the **same** conversation id (the MLS group id).\nReceived messages are persisted and surface via `get_messages` with no\nevent subscription; `list_conversations` / `get_messages` return their\narrays directly under `result`.", "execs": [{"kind": "run", "cmd": "cid=$(cat alice-convo.txt)\nfor i in $(seq 1 50); do\n  msgs=$(./logos/bin/logoscore --config-dir alice call chat_module get_messages \"$cid\" 2>/dev/null || true)\n  case \"$msgs\" in *'\"content\":\"hello-from-bob\"'*) echo \"ALICE_GOT_BOB_MSG\"; exit 0;; esac\n  sleep 3\ndone\necho \"alice never received bob's message\" >&2; exit 1\n", "status": "pass", "exit_code": 0, "output": "ALICE_GOT_BOB_MSG\n", "note": ""}]}, {"md": "### 5.6 Alice replies\n\n```bash\nlogoscore --config-dir alice call chat_module send_message \"$ALICE_CONVO\" hi-bob-got-it\n```", "execs": [{"kind": "run", "cmd": "cid=$(cat alice-convo.txt)\n./logos/bin/logoscore --config-dir alice call chat_module send_message \"$cid\" hi-bob-got-it\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"send_message\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.7 Bob receives Alice's reply\n\n```bash\nlogoscore --config-dir bob call chat_module get_messages \"$BOB_CONVO\"\n```\n\nThe same path in reverse: a real bidirectional, end-to-end-encrypted\nround-trip between two independent headless `chat_module` instances.", "execs": [{"kind": "run", "cmd": "cid=$(cat bob-convo.txt)\nfor i in $(seq 1 50); do\n  msgs=$(./logos/bin/logoscore --config-dir bob call chat_module get_messages \"$cid\" 2>/dev/null || true)\n  case \"$msgs\" in *'\"content\":\"hi-bob-got-it\"'*) echo \"BOB_GOT_REPLY\"; exit 0;; esac\n  sleep 3\ndone\necho \"bob never received alice's reply\" >&2; exit 1\n", "status": "pass", "exit_code": 0, "output": "BOB_GOT_REPLY\n", "note": ""}]}, {"md": "## Step 6: Stop the daemons", "execs": []}, {"md": "### 6.1 Shut both down gracefully\n\n```bash\nlogoscore --config-dir alice stop\nlogoscore --config-dir bob   stop\n```\n\nAlways stop through the control socket rather than killing the process group: two daemons share one shell here.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir alice stop || true\n./logos/bin/logoscore --config-dir bob   stop || true\n", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}, {"meta": {"name": "Headless three-instance group conversation", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Headless three-instance group conversation\n\nThis tutorial shows `chat_module`'s group API end to end, by example. A\nGroupV2 conversation starts with its creator as the only member and grows\none peer at a time: the creator (or any existing member) invites a peer by\naddress, the group's steward commits the add, and the invited instance joins\nonce the welcome reaches it. Every member sees the **same** conversation id,\nand each received message carries the sender's directory-verified account\naddress.\n\nSo the tutorial runs three headless [`logoscore`](https://github.com/logos-co/logos-logoscore-cli)\ndaemons (Alice, Bob, and Carol), each loading `chat_module` and its runtime\ndependency `delivery_module`, and drives them through the `logoscore call`\nCLI: `init`, `get_address`, `create_group_conversation`, `add_group_member`,\n`send_message`, and reading the shared thread back with\n`list_conversations` / `get_messages`.\n\nGroup membership changes are **asynchronous by design**: an add is first\nagreed by the group (a consensus proposal), then batched into an MLS commit\nby the group's steward after a commit-inactivity window, and only then does\nthe welcome go out. With the default de-mls timing that window is 60s, so\nexpect a join to land minutes after the `add_group_member` call over the\nlive network \u2014 the poll loops below are budgeted for that.\n\n**What you'll build:** A verified three-member, end-to-end-encrypted group conversation across three headless chat_module instances, grown member by member, with sender-attributed message fan-out.\n\n**What you'll learn:**\n\n- Run three isolated `logoscore` daemons on one host, selected by `--config-dir`\n- Create a named group with `create_group_conversation` and grow it with `add_group_member` \u2014 including an add proposed by a non-creator member\n- Why a group join lands asynchronously (consensus + steward commit + welcome), and how to observe it by polling `list_conversations`\n- How every member shares one conversation id, and how `get_messages` attributes each inbound message to its sender's account address\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\n- **A Linux or macOS machine.** Nix provides every toolchain (Qt, CMake, cargo, rustc) during the builds.\n- **`jq`** on `PATH` (used to read the JSON the CLI prints). GitHub runners ship it; locally, run the spec inside `nix shell nixpkgs#jq`.\n- **Network access.** The three delivery nodes discover each other over the `logos.test` Waku fleet; an isolated sandbox won't complete the exchange. Expect ~5-40s to reach Online, minutes per membership change, and up to ~2 min for messages to propagate.", "execs": []}, {"md": "## Step 1: Build the tools and the two modules\n\nTwo tools drive the exchange: `logoscore` (the headless module runtime,\nwhich also bundles `capability_module` under `logos/modules/`) and `lgpm`\n(the package installer). Then the two modules the daemons load:\n`chat_module`, and its runtime dependency `delivery_module`.", "execs": []}, {"md": "### 1.1 Build logoscore\n\n```bash\nnix build 'github:logos-co/logos-logoscore-cli' --out-link ./logos\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-logoscore-cli' --out-link ./logos", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.2 Build lgpm\n\n```bash\nnix build 'github:logos-co/logos-package-manager#cli' -o lgpm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 1.3 Build chat_module (the commit under test)\n\n```bash\nnix build 'github:logos-co/logos-chat-module#lgx' -o chat-lgx\n```", "execs": [{"kind": "run", "cmd": "nix build \"github:logos-co/logos-chat-module/2c61778111c40a31b68f662df8cfe45f984ceae1#lgx\" -o chat-lgx", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\n", "note": ""}]}, {"md": "### 1.4 Build delivery_module (chat_module's runtime dependency)\n\n```bash\nnix build 'github:logos-co/logos-chat-module#delivery_module-lgx' -o delivery-lgx\n```\n\nBuilt from `chat_module`'s own flake, so the running `delivery_module`\nis the exact rev `chat_module` is built against.", "execs": [{"kind": "run", "cmd": "nix build \"github:logos-co/logos-chat-module/2c61778111c40a31b68f662df8cfe45f984ceae1#delivery_module-lgx\" -o delivery-lgx", "status": "pass", "exit_code": 0, "output": "warning: ignoring untrusted flake configuration setting 'extra-substituters'.\nPass '--accept-flake-config' to trust it\nwarning: ignoring untrusted flake configuration setting 'extra-trusted-public-keys'.\nPass '--accept-flake-config' to trust it\n", "note": ""}]}, {"md": "## Step 2: Assemble the modules directory\n\nAll three daemons load from one shared modules directory: the\n`capability_module` that ships with `logoscore`, plus the two `.lgx`s\ninstalled on top.", "execs": []}, {"md": "### 2.1 Install the bundled and built modules\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/                       # bundled capability_module\nlgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx\nlgpm --modules-dir ./modules --allow-unsigned install --file chat-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file delivery-lgx/*.lgx\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file chat-lgx/*.lgx\n", "status": "pass", "exit_code": 0, "output": "Installing from file: delivery-lgx/logos-delivery_module-module-lib.lgx... done\nInstalled to: ./modules\nInstalling from file: chat-lgx/logos-chat_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "## Step 3: Start three isolated daemons\n\nOne module is a per-host singleton inside a daemon, so Alice, Bob, and\nCarol are **separate daemons**, kept apart by `--config-dir` (control\nsocket, client token, persistence, and the per-instance directory each daemon\nassigns its `chat_module`). Their delivery nodes need no such scoping: each\npicks its own listening ports.", "execs": []}, {"md": "### 3.1 Start the three daemons\n\n```bash\nlogoscore --config-dir alice -D -m ./modules > alice-daemon.log &\nlogoscore --config-dir bob   -D -m ./modules > bob-daemon.log &\nlogoscore --config-dir carol -D -m ./modules > carol-daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir alice -D -m ./modules > alice-daemon.log 2>&1 &'\nsh -c './logos/bin/logoscore --config-dir bob   -D -m ./modules > bob-daemon.log 2>&1 &'\nsh -c './logos/bin/logoscore --config-dir carol -D -m ./modules > carol-daemon.log 2>&1 &'\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Wait for the three control planes to come up\n\n```bash\n# poll each daemon's control plane until it answers\nlogoscore --config-dir alice list-modules\nlogoscore --config-dir bob   list-modules\nlogoscore --config-dir carol list-modules\n```", "execs": [{"kind": "run", "cmd": "for who in alice bob carol; do\n  up=\"\"\n  for i in $(seq 1 30); do\n    if ./logos/bin/logoscore --config-dir \"$who\" list-modules >/dev/null 2>&1; then\n      up=1; echo \"${who}_DAEMON_UP\"; break\n    fi\n    sleep 1\n  done\n  if [ -z \"$up\" ]; then echo \"$who daemon never came up\" >&2; tail -n 40 \"${who}-daemon.log\" >&2; exit 1; fi\ndone\n", "status": "pass", "exit_code": 0, "output": "alice_DAEMON_UP\nbob_DAEMON_UP\ncarol_DAEMON_UP\n", "note": ""}]}, {"md": "### 3.3 Load chat_module on each (delivery_module auto-resolves)\n\n```bash\nlogoscore --config-dir alice load-module chat_module\nlogoscore --config-dir bob   load-module chat_module\nlogoscore --config-dir carol load-module chat_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir alice load-module chat_module\n./logos/bin/logoscore --config-dir bob   load-module chat_module\n./logos/bin/logoscore --config-dir carol load-module chat_module\n", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[\"delivery_module\"],\"module\":\"chat_module\",\"status\":\"ok\",\"version\":\"0.2.0\"}\n{\"dependencies_loaded\":[\"delivery_module\"],\"module\":\"chat_module\",\"status\":\"ok\",\"version\":\"0.2.0\"}\n{\"dependencies_loaded\":[\"delivery_module\"],\"module\":\"chat_module\",\"status\":\"ok\",\"version\":\"0.2.0\"}\n", "note": ""}]}, {"md": "## Step 4: Bring the three instances online\n\n`init(delivery_preset)` returns immediately and kicks off the\ndelivery bootstrap asynchronously; readiness arrives later when\n`status().delivery_state` flips to `online`. All three are\ninitialised **first** so their cold Waku bootstraps overlap, then each is\npolled; the wait is ~the slowest of the three, not their sum.", "execs": []}, {"md": "### 4.1 Initialise Alice, Bob, and Carol\n\n```bash\nlogoscore --config-dir alice call chat_module init logos.test\nlogoscore --config-dir bob   call chat_module init logos.test\nlogoscore --config-dir carol call chat_module init logos.test\n```\n\nNeither storage nor ports need an argument: each instance uses the\ndirectory its daemon assigned it, and its delivery node listens on\nports it picks itself.", "execs": [{"kind": "run", "cmd": "for who in alice bob carol; do\n  out=$(./logos/bin/logoscore --config-dir \"$who\" call chat_module init logos.test)\n  echo \"$out\"\n  echo \"$out\" | jq -e '.result.success == true' >/dev/null || { echo \"$who init failed: $out\" >&2; exit 1; }\n  echo \"${who}_INIT_OK\"\ndone\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"init\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\nalice_INIT_OK\n{\"method\":\"init\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\nbob_INIT_OK\n{\"method\":\"init\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\ncarol_INIT_OK\n", "note": ""}]}, {"md": "### 4.2 Wait for all three to reach Online\n\n```bash\n# poll status() until delivery_state == online (fail fast on \"error\")\nlogoscore --config-dir alice call chat_module status\nlogoscore --config-dir bob   call chat_module status\nlogoscore --config-dir carol call chat_module status\n```", "execs": [{"kind": "run", "cmd": "for who in alice bob carol; do\n  online=\"\"\n  for i in $(seq 1 60); do\n    out=$(./logos/bin/logoscore --config-dir \"$who\" call chat_module status 2>/dev/null || true)\n    case \"$out\" in\n      *'\"delivery_state\":\"online\"'*) online=1; echo \"${who}_ONLINE\"; break;;\n      *'\"delivery_state\":\"error\"'*) echo \"$who delivery error: $out\" >&2; tail -n 40 \"${who}-daemon.log\" >&2; exit 1;;\n    esac\n    sleep 2\n  done\n  if [ -z \"$online\" ]; then echo \"$who never came online\" >&2; tail -n 40 \"${who}-daemon.log\" >&2; exit 1; fi\ndone\n", "status": "pass", "exit_code": 0, "output": "alice_ONLINE\nbob_ONLINE\ncarol_ONLINE\n", "note": ""}]}, {"md": "## Step 5: Create the group and grow it to three members\n\nAlice creates the group (a one-member conversation) and invites Bob by\nhis address. Once Bob is in, **Bob** \u2014 not the creator \u2014 invites Carol:\nany member can propose an add. Each add is agreed by the group, committed\nby the steward after the commit-inactivity window, and the welcome then\ntravels to the invited instance, so the polls below wait minutes, not\nseconds.", "execs": []}, {"md": "### 5.1 Everyone publishes an address\n\n```bash\nlogoscore --config-dir alice call chat_module get_address | jq -j '.result' > alice-addr.txt\nlogoscore --config-dir bob   call chat_module get_address | jq -j '.result' > bob-addr.txt\nlogoscore --config-dir carol call chat_module get_address | jq -j '.result' > carol-addr.txt\n```\n\nThe address is the instance's account address. Peers use it both to\nopen 1:1 conversations and to invite the instance into groups; the\nkey material behind it was published to the registry during `init`.", "execs": [{"kind": "run", "cmd": "for who in alice bob carol; do\n  out=$(./logos/bin/logoscore --config-dir \"$who\" call chat_module get_address)\n  echo \"$out\" | jq -j '.result' > \"${who}-addr.txt\"\n  echo \"${who} address: $(cat ${who}-addr.txt)\"\ndone\n", "status": "pass", "exit_code": 0, "output": "alice address: 9ec549da2d5f41a6a964b52ad91aa9d44d7fd6fdb6c29593eb56b7cc30baf4c7\nbob address: adf56c105a2fa23050658e0ba751f48add34c6282db739ddc132a69384715145\ncarol address: 87f6decdce177c28a9b6610a30972c080cb5732864c632016247f7045a33de40\n", "note": ""}]}, {"md": "### 5.2 Alice creates the group\n\n```bash\nlogoscore --config-dir alice call chat_module create_group_conversation \"Book Club\" \"Weekly sci-fi picks\"\n```\n\nThe group starts with Alice as its only member; `result.value` is the\nconversation id **every** member will see once they join. The name and\ndescription Alice passed are the group's shared metadata, stored in its\nMLS context and delivered to every joiner in the welcome.", "execs": [{"kind": "run", "cmd": "out=$(./logos/bin/logoscore --config-dir alice call chat_module create_group_conversation \"Book Club\" \"Weekly sci-fi picks\")\necho \"$out\"\necho \"$out\" | jq -e '.result.success == true' >/dev/null || { echo \"create_group_conversation failed: $out\" >&2; exit 1; }\necho \"$out\" | jq -j '.result.value' > group-id.txt\necho \"group id: $(cat group-id.txt)\"\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"create_group_conversation\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":\"af3fa43868\"},\"status\":\"ok\"}\ngroup id: af3fa43868\n", "note": ""}]}, {"md": "### 5.3 Alice invites Bob\n\n```bash\nlogoscore --config-dir alice call chat_module add_group_member \"$GROUP_ID\" @bob-addr.txt\n```\n\nThe call returns as soon as the add is proposed; the commit and the\nwelcome happen asynchronously in the group.", "execs": [{"kind": "run", "cmd": "gid=$(cat group-id.txt)\nout=$(./logos/bin/logoscore --config-dir alice call chat_module add_group_member \"$gid\" @bob-addr.txt)\necho \"$out\"\necho \"$out\" | jq -e '.result.success == true' >/dev/null || { echo \"add_group_member failed: $out\" >&2; exit 1; }\necho \"BOB_INVITED\"\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"add_group_member\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\nBOB_INVITED\n", "note": ""}]}, {"md": "### 5.4 Bob joins and sees the shared name\n\n```bash\n# poll until the group appears in Bob's conversations, carrying its name\nlogoscore --config-dir bob call chat_module list_conversations\n```\n\nBob's instance observes the group under the **same** conversation id\nAlice created, and its shared name reached him in the welcome: no local\nargument set it. One id and one name per group, shared by all members.", "execs": [{"kind": "run", "cmd": "gid=$(cat group-id.txt)\nfor i in $(seq 1 150); do\n  row=$(./logos/bin/logoscore --config-dir bob call chat_module list_conversations 2>/dev/null | jq -c --arg id \"$gid\" '.result[]? | select(.convo_id == $id)' || true)\n  if [ -n \"$row\" ]; then echo \"BOB_IN_GROUP name=$(echo \"$row\" | jq -r '.name // \"\"')\"; break; fi\n  sleep 4\ndone\n[ -n \"$row\" ] || { echo \"bob never joined the group\" >&2; tail -n 40 bob-daemon.log >&2; exit 1; }\n", "status": "pass", "exit_code": 0, "output": "BOB_IN_GROUP name=Book Club\n", "note": ""}]}, {"md": "### 5.5 Bob invites Carol (a non-creator add)\n\n```bash\nlogoscore --config-dir bob call chat_module add_group_member \"$GROUP_ID\" @carol-addr.txt\n```\n\nGroup membership is symmetric: any member can propose an add, the\ngroup agrees, the steward commits, and the proposer's instance routes\nthe welcome to the newcomer.", "execs": [{"kind": "run", "cmd": "gid=$(cat group-id.txt)\nout=$(./logos/bin/logoscore --config-dir bob call chat_module add_group_member \"$gid\" @carol-addr.txt)\necho \"$out\"\necho \"$out\" | jq -e '.result.success == true' >/dev/null || { echo \"add_group_member failed: $out\" >&2; exit 1; }\necho \"CAROL_INVITED\"\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"add_group_member\",\"module\":\"chat_module\",\"result\":{\"error\":null,\"success\":true,\"value\":null},\"status\":\"ok\"}\nCAROL_INVITED\n", "note": ""}]}, {"md": "### 5.6 Carol joins\n\n```bash\n# poll until the group id appears in Carol's conversations\nlogoscore --config-dir carol call chat_module list_conversations\n```", "execs": [{"kind": "run", "cmd": "gid=$(cat group-id.txt)\nfor i in $(seq 1 150); do\n  got=$(./logos/bin/logoscore --config-dir carol call chat_module list_conversations 2>/dev/null | jq -r --arg id \"$gid\" '.result[]? | select(.convo_ <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
