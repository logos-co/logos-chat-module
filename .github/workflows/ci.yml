name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable && rustup component add rustfmt clippy

      # hashgraph-like-consensus (via the libchat dep graph) runs prost-build in
      # its build script, which needs protoc on PATH. The nix build gets it from
      # the flake (metadata.json's `protobuf`); the bare-cargo jobs install it here.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # The generated scaffold (generated/provider_gen.rs) and the SDK source the
      # crate path-deps are gitignored, so bare cargo can't resolve them. Generate
      # both into the working tree, then run cargo in rust-lib/ directly.
      - name: Generate the rust build inputs
        run: nix run .#generate -L

      - name: cargo fmt --check
        working-directory: rust-lib
        run: cargo fmt --check

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: rust-lib

      - name: cargo clippy
        working-directory: rust-lib
        run: cargo clippy --locked --all-targets -- -D warnings

  cargo:
    name: cargo (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      # protoc is needed by hashgraph-like-consensus's prost-build build script
      # (see the lint job). The nix build gets it from the flake; install it here.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate the rust build inputs
        run: nix run .#generate -L

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: rust-lib

      - name: cargo test
        working-directory: rust-lib
        run: cargo test --locked

  nix:
    name: nix (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: nix build .#chat_module
        run: nix build .#chat_module -L
