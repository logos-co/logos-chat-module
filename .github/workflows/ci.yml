name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable && rustup component add rustfmt clippy

      # The generated scaffold (generated/provider_gen.rs) and the SDK source the
      # crate path-deps are gitignored, so bare cargo can't resolve them. Generate
      # both into the working tree, then run cargo in rust-lib/ directly.
      - name: Generate the rust build inputs
        run: nix run .#generate -L

      - name: cargo fmt --check
        working-directory: rust-lib
        run: cargo fmt --check

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: rust-lib

      # clippy compiles the dep graph, so it runs inside the flake devShell for
      # protoc (see flake.nix); the root flake is referenced via GITHUB_WORKSPACE.
      - name: cargo clippy
        working-directory: rust-lib
        run: nix develop "$GITHUB_WORKSPACE" --command cargo clippy --locked --all-targets -- -D warnings

  cargo:
    name: cargo (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Generate the rust build inputs
        run: nix run .#generate -L

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: rust-lib

      # compiles the dep graph, so it runs inside the flake devShell for protoc
      # (see flake.nix); the root flake is referenced via GITHUB_WORKSPACE.
      - name: cargo test
        working-directory: rust-lib
        run: nix develop "$GITHUB_WORKSPACE" --command cargo test --locked

  nix:
    name: nix (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: logos-co
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: nix build .#chat_module
        run: nix build .#chat_module -L

  relay:
    name: mailbox-relay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Standalone crate with no libchat/protobuf deps, so it runs bare cargo — no
    # nix devShell and no `.#generate`, unlike the rust-lib jobs above.
    defaults:
      run:
        working-directory: tools/mailbox-relay
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable && rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: tools/mailbox-relay

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --locked
