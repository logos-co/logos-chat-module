name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    environment: ${{ github.ref == 'refs/heads/master' && 'public-cache' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix and Logos cache
        uses: logos-co/setup-nix-cache-action@v1
        with:
          attic-token-ci: ${{ secrets.ATTIC_TOKEN_CI }}
          attic-token-public: ${{ secrets.ATTIC_TOKEN_PUBLIC }}

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable && rustup component add rustfmt clippy

      # The generated scaffold (generated/provider_gen.rs) and the SDK source the
      # crate path-deps are gitignored, so bare cargo can't resolve them. Generate
      # both into the working tree, then run cargo in rust-lib/ directly.
      - name: Generate the rust build inputs
        run: nix run .#generate -L

      - name: cargo fmt --check
        working-directory: rust-lib
        run: cargo fmt --check

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: rust-lib

      # clippy compiles the dep graph, so it runs inside the flake devShell for
      # protoc (see flake.nix); the root flake is referenced via GITHUB_WORKSPACE.
      - name: cargo clippy
        working-directory: rust-lib
        run: nix develop "$GITHUB_WORKSPACE" --command cargo clippy --locked --all-targets -- -D warnings

  cargo:
    name: cargo (${{ matrix.os }})
    environment: ${{ github.ref == 'refs/heads/master' && 'public-cache' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix and Logos cache
        uses: logos-co/setup-nix-cache-action@v1
        with:
          attic-token-ci: ${{ secrets.ATTIC_TOKEN_CI }}
          attic-token-public: ${{ secrets.ATTIC_TOKEN_PUBLIC }}

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Generate the rust build inputs
        run: nix run .#generate -L

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: rust-lib

      # compiles the dep graph, so it runs inside the flake devShell for protoc
      # (see flake.nix); the root flake is referenced via GITHUB_WORKSPACE.
      - name: cargo test
        working-directory: rust-lib
        run: nix develop "$GITHUB_WORKSPACE" --command cargo test --locked

  nix:
    name: nix (${{ matrix.os }})
    environment: ${{ github.ref == 'refs/heads/master' && 'public-cache' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nix and Logos cache
        uses: logos-co/setup-nix-cache-action@v1
        with:
          attic-token-ci: ${{ secrets.ATTIC_TOKEN_CI }}
          attic-token-public: ${{ secrets.ATTIC_TOKEN_PUBLIC }}

      - name: nix build .#chat_module
        run: nix build .#chat_module -L
