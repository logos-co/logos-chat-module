g from file: delivery-lgx/logos-delivery_module-module-lib.lgx... done\nInstalled to: ./modules\nInstalling from file: chat-lgx/logos-chat_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "## Step 3: Start two isolated daemons\n\nOne module is a per-host singleton inside a daemon, so Alice and Bob are\n**separate daemons**. The only thing that keeps them apart is `--config-dir`:\nit scopes each daemon's control socket, client token, and persistence to its\nown tree, so a `logoscore call --config-dir alice ...` always reaches Alice's\ndaemon. (Their delivery nodes are kept apart separately, by the distinct\n`tcp_port` passed to `init` in the next step.)", "execs": []}, {"md": "```bash\nmkdir -p alice-data bob-data\n```", "execs": [{"kind": "run", "cmd": "mkdir -p alice-data bob-data", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.1 Start Alice's daemon\n\n```bash\nlogoscore --config-dir alice -D -m ./modules > alice-daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir alice -D -m ./modules > alice-daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.2 Start Bob's daemon\n\n```bash\nlogoscore --config-dir bob -D -m ./modules > bob-daemon.log &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore --config-dir bob -D -m ./modules > bob-daemon.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 3.3 Wait for both control planes to come up\n\n```bash\n# poll each daemon's control plane until it answers\nlogoscore --config-dir alice list-modules\nlogoscore --config-dir bob   list-modules\n```", "execs": [{"kind": "run", "cmd": "for who in alice bob; do\n  up=\"\"\n  for i in $(seq 1 30); do\n    if ./logos/bin/logoscore --config-dir \"$who\" list-modules >/dev/null 2>&1; then\n      up=1; echo \"${who}_DAEMON_UP\"; break\n    fi\n    sleep 1\n  done\n  if [ -z \"$up\" ]; then echo \"$who daemon never came up\" >&2; tail -n 40 \"${who}-daemon.log\" >&2; exit 1; fi\ndone\n", "status": "pass", "exit_code": 0, "output": "alice_DAEMON_UP\nbob_DAEMON_UP\n", "note": ""}]}, {"md": "### 3.4 Load chat_module on each (delivery_module auto-resolves)\n\n```bash\nlogoscore --config-dir alice load-module chat_module\nlogoscore --config-dir bob   load-module chat_module\n```\n\n`chat_module` declares `dependencies: [delivery_module]`, so the host loads delivery_module on each daemon automatically.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir alice load-module chat_module\n./logos/bin/logoscore --config-dir bob   load-module chat_module\n", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[\"delivery_module\"],\"module\":\"chat_module\",\"status\":\"ok\",\"version\":\"0.1.1\"}\n{\"dependencies_loaded\":[\"delivery_module\"],\"module\":\"chat_module\",\"status\":\"ok\",\"version\":\"0.1.1\"}\n", "note": ""}]}, {"md": "## Step 4: Bring both instances online\n\n`init(instance_path, delivery_preset, tcp_port)` returns immediately and\nkicks off the delivery bootstrap asynchronously; readiness arrives later when\nthe subscribe handshake completes and `status().delivery_state` flips to\n`online`. Both instances are initialised **first** so their two cold Waku\nbootstraps overlap, then each is polled; the wait is ~the slower of the two,\nnot their sum.", "execs": []}, {"md": "### 4.1 Initialise Alice (delivery port 60010) and Bob (60011)\n\n```bash\nlogoscore --config-dir alice call chat_module init \"$PWD/alice-data\" logos.test 60010\nlogoscore --config-dir bob   call chat_module init \"$PWD/bob-data\"   logos.test 60011\n```\n\nDistinct `instance_path` and `tcp_port` per instance: `tcp_port` is bound\nfor both the Waku TCP listener and the discv5 UDP port, so the two nodes\nmust not share it.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore --config-dir alice call chat_module init \"$PWD/alice-data\ os/bin/logoscore --config-dir bob   stop || true\n", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
